security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: SyncEngine\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api:
            pattern: ^/api
            stateless: true
            http_basic:
                provider: app_user_provider
            custom_authenticator: SyncEngine\Security\ApiTokenAuthenticator
        main:
            lazy: true
            provider: app_user_provider

            form_login:
                # "app_login" is the name of the route created previously
                login_path: syncengine_admin_login
                check_path: syncengine_admin_login

            json_login:
                # api_login is a route we will create below
                check_path: api_login
                username_path: security.credentials.login
                password_path: security.credentials.password

            remember_me:
              secret: '%kernel.secret%'
              lifetime: 604800
              path: /
              always_remember_me: true

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

        secured_area:
            form_login:
                enable_csrf: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS,ips: '%syncengine.security.trusted_ips%'}
        - { path: ^/login, roles: PUBLIC_ACCESS, allow_if: "'%env(SYNCENGINE_TRUSTED_IPS)%' == null"}
        - { path: ^/install, roles: PUBLIC_ACCESS, allow_if: "'%env(SYNCENGINE_TRUSTED_IPS)%' == null" }
        - { path: ^/api, roles: ROLE_USER, ips: '%syncengine.security.trusted_ips%' }
        - { path: ^/api, roles: ROLE_USER, allow_if: "is_granted('ROLE_USER') and '%env(SYNCENGINE_TRUSTED_IPS)%' == null" }
        - { path: ^/account, roles: ROLE_USER, allow_if: "is_granted('ROLE_USER') and '%env(SYNCENGINE_TRUSTED_IPS)%' == null" }
        - { path: ^/admin, roles: ROLE_ADMIN, ips: '%syncengine.security.trusted_ips%' }
        - { path: ^/admin, roles: ROLE_ADMIN, allow_if: "is_granted('ROLE_ADMIN') and '%env(SYNCENGINE_TRUSTED_IPS)%' == null" }
        - { path: ^/system, roles: ROLE_ADMIN,ips: '%syncengine.security.trusted_ips%' }
        - { path: ^/system, roles: ROLE_ADMIN, allow_if: "is_granted('ROLE_ADMIN') and '%env(SYNCENGINE_TRUSTED_IPS)%' == null" }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon

    task-filter: 'bi bi-funnel'
    task-group: 'bi bi-inboxes'
    task-index: 'bi bi-tag'
    task-loop: 'bi bi-arrow-repeat'
    task-map: 'bi bi-shuffle'
    task-merge: 'bi bi-sign-merge-right'
    task-replace: 'bi bi-arrow-left-right'
    task-retrieve: 'bi bi-cloud-download'
    task-send: 'bi bi-send'
    task-set: 'bi bi-save2'
    task-sort: 'bi bi-sort-down'
    task-split: 'bi bi-sign-intersection-y'
    task-store: 'bi bi-database'
    task-template: 'bi bi-code-slash'
    task-trace: 'bi bi-journal-plus'
    task-trigger: 'bi bi-lightning'
    task-wait: 'bi bi-stopwatch'
    # Account
    account: 'bi bi-person-circle'
    account-edit: 'bi bi-person-gear'
    token: 'bi bi-shield-lock'
    restrict: 'bi bi-shield-slash'
    # System.
    system: 'bi bi-gear-wide-connected'
    system-environment: 'bi bi-motherboard'
    system-vault: 'bi bi-safe'
    system-processes: 'bi bi-terminal'
    system-processes-manager: 'bi bi-cpu-fill'
    system-processes-config: 'bi bi-cpu'
    # General
    dashboard: 'bi bi-speedometer'
    condition: 'bi bi-check2-square'
    event: 'bi bi-lightning-charge'
    module: 'bi bi-plugin'
    schema: 'bi bi-diagram-2'
    system-info: 'bi bi-info-square'
    send: 'bi bi-send'
    retrieve: 'bi bi-cloud-download'
    request: 'bi bi-send-arrow-down'
    response: 'bi bi-reply'
    cache: 'bi bi-memory'
    variable: 'bi bi-braces-asterisk'
    tag: 'bi bi-braces'
    reboot: 'bi bi-bootstrap-reboot'
    # Run.
    event-cancel: 'x-octagon'
    event-success: 'exclamation-triangle'
    event-error: 'check-circle'
    preview: 'bi bi-play-circle'
    preview-live: 'bi bi-play-circle-fill'
    preview-scope: 'bi bi-skip-forward-circle'
    preview-scope-live: 'bi bi-skip-forward-circle-fill'
    # Edit.
    edit: 'bi bi-pencil-fill'
    set: 'bi bi-pencil-square'
    save: 'bi bi-save'
    update: 'bi bi-check-square'
    cross: 'bi bi-x-lg'
    plus: 'bi bi-plus-lg'
    check: 'bi bi-check-lg'
    delete: 'bi bi-trash-fill'
    remove: 'bi bi-dash-circle'
    grid: 'bi bi-input-cursor'
    input-select: 'bi bi-view-list'
    input-text: 'bi bi-input-cursor-text'
    input-textarea: 'bi bi-textarea-resize'
    # Generic.
    input: 'bi bi-box-arrow-in-right'
    output: 'bi bi-box-arrow-right'
    sort: 'bi bi-grip-vertical' #'bi bi-arrows-expand' # arrow-down-up # bi-chevron-bar-expand
    copy: 'bi bi-copy'
    help: 'bi bi-info-circle'
    upload: 'bi bi-upload'
    export: 'bi bi-upload'
    download: 'bi bi-download'
    import: 'bi bi-download'
    config: 'bi bi-gear'
    configured: 'bi bi-gear-fill'
    required: 'bi bi-asterisk'
    readonly: 'bi bi-shield-fill'
    code: 'bi bi-code'
    code-formatted: 'bi bi-chevron-expand'
    secret: 'bi bi-key'
    view: 'bi bi-eye-fill'
    visible: 'bi bi-eye'
    hidden: 'bi bi-eye-slash'
    clipboard: 'bi bi-clipboard'
    link: 'bi bi-link-45deg'
    reset: 'bi bi-arrow-counterclockwise'
    # Menu.
    menu-expand: 'bi bi-text-indent-left'
    menu-collapse: 'bi bi-text-indent-right'
    toolbar-menu: 'bi bi-three-dots-vertical'
    # Window.
    size-expand": 'bi bi-arrows-angle-expand'
    size-contract: 'bi bi-arrows-angle-contract'
    size-expand-x: 'bi bi-arrows-expand-vertical'
    size-contract-x: 'bi bi-arrows-collapse-vertical'
    size-expand-y: 'bi bi-arrows-expand'
    size-contract-y: 'bi bi-arrows-collapse'
    # Trace.
    trace-info: 'bi bi-info-circle'
    trace-iteration: 'bi bi-hash'
    trace-start: 'bi bi-calendar'
    trace-end: 'bi bi-calendar-check-fill'
    trace-duration: 'bi bi-stopwatch'
    trace-follow: 'bi bi-folder-symlink'
    # Collapsible
    accordion-close: 'bi bi-chevron-up'
    accordion-open: 'bi bi-chevron-down'
    # Theme
    theme-auto: 'bi bi-circle-half'
    theme-light: 'bi bi-sun-fill'
    theme-dark: 'bi bi-moon-stars-fill'

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Default ENV vars.
    env(APP_BUILD_PATH): 'build'
    env(SYNCENGINE_VAULT): ''
    # Params.
    syncengine.dir.root: '%kernel.project_dir%'
    syncengine.dir.modules: '%syncengine.dir.root%/modules'
    syncengine.dir.blueprints: '%syncengine.dir.root%/blueprints'
    syncengine.namespace.root: 'SyncEngine'
    syncengine.namespace.modules: '%syncengine.namespace.root%\Module'
    syncengine.max_traces: '%env(SYNCENGINE_MAX_TRACES)%'
    syncengine.mailer.sender: '%env(SYNCENGINE_MAILER_SENDER)%'
    syncengine.mailer.email_admin: '%env(SYNCENGINE_MAILER_EMAIL_ADMIN)%'
    syncengine.trusted.ips: '127.0.0.1, %env(SYNCENGINE_TRUSTED_IPS)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $projectDir: '%kernel.project_dir%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    SyncEngine\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Model/'
            - '../src/Kernel.php'

    SyncEngine\Module\:
        resource: '../modules/'
        autowire: true
        lazy: false

    _instanceof:
        # services whose classes are instances of CustomInterface will be tagged automatically
        SyncEngine\Model\Abstract\EntityModel:
            tags: [ 'syncengine.entity' ]
        SyncEngine\Model\ModuleModel:
            tags: [ 'syncengine.module' ]
        SyncEngine\Model\BlueprintModel:
            tags: [ 'syncengine.blueprint' ]
        SyncEngine\Model\ColumnModel:
          tags: [ 'syncengine.column' ]
        SyncEngine\Model\TaskModel:
            tags: [ 'syncengine.task' ]
        SyncEngine\Model\WebserviceModel:
            tags: [ 'syncengine.webservice' ]

    SyncEngine\Service\Provider\Modules:
        arguments: [ !tagged_locator { tag: 'syncengine.module', default_index_method: '_getClassLocator' } ]
    SyncEngine\Service\Provider\Blueprints:
        arguments: [
            '%syncengine.dir.blueprints%',
            !tagged_locator { tag: 'syncengine.blueprint', default_index_method: '_getClassLocator' }
        ]
    SyncEngine\Service\Provider\Columns:
      arguments: [ !tagged_locator { tag: 'syncengine.column', default_index_method: '_getClassLocator' } ]
    SyncEngine\Service\Provider\Tasks:
        arguments: [ !tagged_locator { tag: 'syncengine.task', default_index_method: '_getClassLocator' } ]
    SyncEngine\Service\Provider\Webservices:
        arguments: [ !tagged_locator { tag: 'syncengine.webservice', default_index_method: '_getClassLocator' } ]

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

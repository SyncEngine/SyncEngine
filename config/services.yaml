# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

imports:
  - { resource: 'icons.yaml' }
  - { resource: 'modules.yaml' }

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Default ENV vars.
    env(APP_BUILD_PATH): 'build'
    env(SYNCENGINE_NAME): ''
    env(SYNCENGINE_VAULT): ''
    env(SYNCENGINE_API_TOKEN_HEADER): ''
    # Params.
    syncengine.meta.title: '%env(SYNCENGINE_NAME)%'
    syncengine.dir.root: '%kernel.project_dir%'
    syncengine.dir.var: '%syncengine.dir.root%/var'
    syncengine.dir.tmp: '%syncengine.dir.root%/var/tmp'
    syncengine.dir.modules: '%syncengine.dir.root%/modules'
    syncengine.dir.blueprints: '%syncengine.dir.root%/blueprints'
    syncengine.dir.translations: '%syncengine.dir.root%/translations'
    syncengine.namespace.root: 'SyncEngine'
    syncengine.namespace.modules: '%syncengine.namespace.root%\Module'
    syncengine.max_traces: '%env(SYNCENGINE_MAX_TRACES)%'
    syncengine.mailer.sender: '%env(SYNCENGINE_MAILER_SENDER)%'
    syncengine.mailer.email_admin: '%env(SYNCENGINE_MAILER_EMAIL_ADMIN)%'
    syncengine.security.trusted_ips: '127.0.0.1, %env(SYNCENGINE_TRUSTED_IPS)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $projectDir: '%kernel.project_dir%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    SyncEngine\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Model/'
            - '../src/Kernel.php'

    # Register module route loader.
    SyncEngine\Routing\ModuleLoader:
        tags: [routing.loader]

    # Autoconfigure service tags based on instances.
    _instanceof:
        SyncEngine\Model\Abstract\EntityModel:
            tags: [ 'syncengine.model.entity' ]
        SyncEngine\Model\ModuleModel:
            tags: [ 'syncengine.model.module' ]
        SyncEngine\Model\BlueprintModel:
            tags: [ 'syncengine.model.blueprint' ]
        SyncEngine\Model\ColumnModel:
            tags: [ 'syncengine.model.column' ]
        SyncEngine\Model\CodecModel:
            tags: [ 'syncengine.model.codec' ]
        SyncEngine\Model\TaskModel:
            tags: [ 'syncengine.model.task' ]
        SyncEngine\Model\WebserviceModel:
            tags: [ 'syncengine.model.webservice' ]

    SyncEngine\Service\Provider\Modules:
        arguments: [ !tagged_locator { tag: 'syncengine.model.module', default_index_method: '_getClassLocator' } ]
    SyncEngine\Service\Provider\Blueprints:
        arguments: [
            '%syncengine.dir.blueprints%',
            !tagged_locator { tag: 'syncengine.model.blueprint', default_index_method: '_getClassLocator' }
        ]
    SyncEngine\Service\Provider\Columns:
        arguments: [ !tagged_locator { tag: 'syncengine.model.column', default_index_method: '_getClassLocator' } ]
    SyncEngine\Service\Provider\Codecs:
        arguments: [ !tagged_locator { tag: 'syncengine.model.codec', default_index_method: '_getClassLocator' } ]
    SyncEngine\Service\Provider\Tasks:
        arguments: [ !tagged_locator { tag: 'syncengine.model.task', default_index_method: '_getClassLocator' } ]
    SyncEngine\Service\Provider\Webservices:
        arguments: [ !tagged_locator { tag: 'syncengine.model.webservice', default_index_method: '_getClassLocator' } ]

    SyncEngine\Service\Menu\MenuLoader:
        arguments: [ !tagged_locator { tag: 'syncengine.attribute.menuitem' } ]

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

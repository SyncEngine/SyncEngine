# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    modules_directory: '%kernel.project_dir%/modules'
    blueprints_directory: '%kernel.project_dir%/blueprints'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $projectDir: '%kernel.project_dir%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    SyncEngine\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Model/'
            - '../src/Kernel.php'

    Modules\:
        resource: '../modules/'
        autowire: true
        lazy: false

    _instanceof:
        # services whose classes are instances of CustomInterface will be tagged automatically
        SyncEngine\Model\Abstract\EntityModel:
            tags: [ 'syncengine.entity' ]
        SyncEngine\Model\ModuleModel:
            tags: [ 'syncengine.module' ]
        SyncEngine\Model\BlueprintModel:
            tags: [ 'syncengine.blueprint' ]
        SyncEngine\Model\TaskModel:
            tags: [ 'syncengine.task' ]
        SyncEngine\Model\WebserviceModel:
            tags: [ 'syncengine.webservice' ]

    SyncEngine\Service\Modules:
        arguments: [ !tagged_locator { tag: 'syncengine.module', default_index_method: 'getClassName' } ]
    SyncEngine\Service\Blueprints:
        arguments: [
            '%blueprints_directory%',
            !tagged_locator { tag: 'syncengine.blueprint', default_index_method: 'getClassName' }
        ]
    SyncEngine\Service\Tasks:
        arguments: [ !tagged_locator { tag: 'syncengine.task', default_index_method: 'getClassName' } ]
    SyncEngine\Service\Webservices:
        arguments: [ !tagged_locator { tag: 'syncengine.webservice', default_index_method: 'getClassName' } ]

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
